<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Name Change Announcement</title>
  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #f5f7fa, #c3cfe2);
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 600px;
  padding: 2rem;
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  text-align: center;
  animation: fadeIn 1.5s ease-in;
}

header h1 {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  color: #0077cc;
}

.subtitle {
  font-size: 1.2rem;
  margin-bottom: 1.5rem;
}

.announcement {
  font-size: 1rem;
  margin-bottom: 2rem;
}

.new-domain {
  display: inline-block;
  margin: 1rem 0;
  font-size: 1.2rem;
  color: #0077cc;
  text-decoration: none;
  font-weight: bold;
}

.new-domain:hover {
  text-decoration: underline;
}

.countdown h2 {
  font-size: 1.2rem;
  color: #555;
}

footer {
  margin-top: 2rem;
  font-size: 0.9rem;
  color: #777;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .container {
    margin: 1rem;
    padding: 1.5rem;
  }

  header h1 {
    font-size: 2rem;
  }

  .new-domain {
    font-size: 1rem;
  }
}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <h2>www.inforack.in is now <strong><a href="https://www.gstcell.com" class="new-domain" target="_blank"><h1 style="color: #0077cc;">www.gstcell.com</h1></a></strong></h2>
    </header>

    <section class="announcement">
      <p>We’re excited to announce that our website has a new name. Starting today, you can find us at:</p>
      <a href="https://www.gstcell.com" class="new-domain" target="_blank">www.gstcell.com</a>
      <p>All features and services remain the same—just with a fresh new name!</p>
    </section>



    <footer>
      <p>Thank you for your continued support!</p>
    </footer>
  </div>


</body>
</html>
